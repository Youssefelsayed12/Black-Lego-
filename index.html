<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - خزنتي</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', 'Tahoma', sans-serif; }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .login-box {
            max-width: 450px;
            width: 100%;
            background: white;
            border-radius: 45px;
            padding: 50px 40px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.2);
        }
        .login-box h1 { color: #1e293b; margin-bottom: 10px; }
        .login-box p { color: #64748b; margin-bottom: 30px; }
        .login-box input {
            width: 100%;
            padding: 15px;
            margin: 15px 0;
            border: 2px solid #e2e8f0;
            border-radius: 60px;
            font-size: 1rem;
        }
        .login-box input:focus { border-color: #764ba2; outline: none; }
        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            color: white;
            padding: 14px 35px;
            border-radius: 60px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
        }
        .error-msg { color: #ef4444; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="login-box">
        <h1>🔐 خزنتي السحابية</h1>
        <p>سجل دخولك كمدير</p>
        <input type="password" id="password" placeholder="أدخل كلمة السر" onkeyup="if(event.keyCode==13) doLogin()">
        <button class="btn-primary" onclick="doLogin()">دخول</button>
        <div id="errorMsg" class="error-msg"></div>
    </div>

    <script>
        let savedPass = localStorage.getItem('admin_pass');
        let adminPass = savedPass ? savedPass : '1234';
        if (!savedPass) localStorage.setItem('admin_pass', '1234');

        function doLogin() {
            let enteredPass = document.getElementById('password').value;
            if (enteredPass === adminPass) {
                localStorage.setItem('admin_logged', 'yes');
                window.location.href = 'dashboard.html';
            } else {
                document.getElementById('errorMsg').innerHTML = '⚠️ كلمة سر غير صحيحة';
            }
        }
        if (localStorage.getItem('admin_logged') === 'yes') window.location.href = 'dashboard.html';
    </script>
</body>
</html>
