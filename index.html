<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <title>خزنتي - أبسط نسخة</title>
    <style>
        body {
            font-family: 'Tahoma', sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            padding: 20px;
        }
        .container {
            max-width: 1100px;
            margin: auto;
            background: white;
            border-radius: 30px;
            padding: 25px;
        }
        .header {
            background: #1e293b;
            color: white;
            padding: 15px;
            border-radius: 20px;
            text-align: center;
        }
        button, .btn {
            background: #667eea;
            border: none;
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 14px;
            margin: 5px;
        }
        .btn-danger { background: #ef4444; }
        .btn-success { background: #10b981; }
        input, textarea, select {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 15px;
            border: 1px solid #ccc;
        }
        .product-card {
            border: 1px solid #eee;
            border-radius: 20px;
            padding: 15px;
            margin: 10px;
            width: 280px;
            display: inline-block;
            background: #f9f9f9;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 10px;
            border-bottom: 1px solid #ddd;
        }
        .nav-bar {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin: 20px 0;
            flex-wrap: wrap;
        }
        .form-card {
            background: #f1f5f9;
            padding: 20px;
            border-radius: 20px;
            margin-bottom: 20px;
        }
        .login-area {
            max-width: 400px;
            margin: 100px auto;
            background: white;
            padding: 35px;
            border-radius: 30px;
            text-align: center;
        }
        .hidden { display: none; }
        .price { font-size: 22px; font-weight: bold; margin: 10px 0; }
        .error { color: red; margin-top: 10px; }
    </style>
</head>
<body>

<div id="app">
    <!-- شاشة تسجيل الدخول -->
    <div id="loginBox" class="login-area">
        <h2>🔐 دخول المدير</h2>
        <input type="password" id="passwordInput" placeholder="كلمة السر">
        <button onclick="checkLogin()">دخول</button>
        <div id="loginMsg" class="error"></div>
    </div>

    <!-- الواجهة الرئيسية -->
    <div id="mainBox" class="container hidden">
        <div class="header">
            <h1>📦 خزنتي</h1>
        </div>
        <div class="nav-bar">
            <button onclick="showPanel('dashboard')">📋 إدارة المنتجات</button>
            <button onclick="showPanel('store')">🛒 الشراء</button>
            <button onclick="showPanel('settings')">⚙️ الإعدادات</button>
            <button onclick="logout()">🚪 خروج</button>
        </div>

        <!-- لوحة الإدارة -->
        <div id="dashboardPanel">
            <div class="form-card">
                <h3>➕ إضافة منتج</h3>
                <input type="text" id="pName" placeholder="اسم المنتج">
                <input type="number" id="pPriceEGP" placeholder="السعر بالجنيه">
                <input type="number" id="pPriceUSD" placeholder="السعر بالدولار">
                <input type="text" id="pLink" placeholder="رابط الشراء">
                <input type="number" id="pQty" placeholder="الكمية">
                <textarea id="pDesc" rows="2" placeholder="الوصف"></textarea>
                <button onclick="addProduct()">➕ إضافة</button>
            </div>
            <h3>المنتجات الحالية</h3>
            <div id="productsList"></div>
        </div>

        <!-- لوحة الشراء -->
        <div id="storePanel" class="hidden">
            <div style="display: flex; justify-content: space-between;">
                <h3>🛍️ المنتجات</h3>
                <select id="currency" onchange="refreshStore()">
                    <option value="egp">🇪🇬 جنيه</option>
                    <option value="usd">🇺🇸 دولار</option>
                </select>
            </div>
            <div id="storeItems"></div>
        </div>

        <!-- لوحة الإعدادات -->
        <div id="settingsPanel" class="hidden">
            <div class="form-card">
                <h3>🔐 تغيير كلمة السر</h3>
                <input type="password" id="newPass" placeholder="كلمة السر الجديدة">
                <input type="password" id="confirmPass" placeholder="تأكيد كلمة السر">
                <button onclick="changeAdminPass()">💾 حفظ</button>
                <div id="settingMsg" style="margin-top: 10px;"></div>
            </div>
        </div>
    </div>
</div>

<script>
    // مفتاح التخزين
    const KEY = 'my_store_fixed';
    
    // تحميل البيانات أو بدء بيانات جديدة
    let store = localStorage.getItem(KEY);
    if (!store) {
        store = {
            password: '1234',
            products: []
        };
        localStorage.setItem(KEY, JSON.stringify(store));
    } else {
        store = JSON.parse(store);
    }
    
    let products = store.products;
    let adminPass = store.password;
    
    // حفظ البيانات
    function saveAll() {
        store.products = products;
        store.password = adminPass;
        localStorage.setItem(KEY, JSON.stringify(store));
    }
    
    // تسجيل الدخول
    window.checkLogin = function() {
        let pass = document.getElementById('passwordInput').value;
        if (pass === adminPass) {
            localStorage.setItem('logged_in', 'yes');
            document.getElementById('loginBox').classList.add('hidden');
            document.getElementById('mainBox').classList.remove('hidden');
            document.getElementById('loginMsg').innerHTML = '';
            refreshAll();
            showPanel('dashboard');
        } else {
            document.getElementById('loginMsg').innerHTML = '⚠️ كلمة سر خطأ';
        }
    };
    
    window.logout = function() {
        localStorage.removeItem('logged_in');
        document.getElementById('loginBox').classList.remove('hidden');
        document.getElementById('mainBox').classList.add('hidden');
        document.getElementById('passwordInput').value = '';
    };
    
    // تحديث كل الواجهات
    function refreshAll() {
        refreshDashboard();
        refreshStore();
    }
    
    function refreshDashboard() {
        if (products.length === 0) {
            document.getElementById('productsList').innerHTML = '<p>✨ لا توجد منتجات</p>';
            return;
        }
        let html = `<table><thead>汽<th>المنتج</th><th>جنيه</th><th>دولار</th><th>الكمية</th><th>الرابط</th><th></th></thead><tbody>`;
        for (let i = 0; i < products.length; i++) {
            let p = products[i];
            html += `<tr>
                        <td><strong>${p.name}</strong><br><small>${(p.desc || '').substring(0,30)}</small></td>
                        <td>${p.price_egp} ج.م</td>
                        <td>${p.price_usd} $</td>
                        <td>${p.qty}</td>
                        <td><a href="${p.link}" target="_blank">رابط</a></td>
                        <td><button class="btn-danger" onclick="deleteItem(${i})">حذف</button></td>
                    </tr>`;
        }
        html += `</tbody></table>`;
        document.getElementById('productsList').innerHTML = html;
    }
    
    window.addProduct = function() {
        let name = document.getElementById('pName').value;
        let price_egp = parseFloat(document.getElementById('pPriceEGP').value);
        let price_usd = parseFloat(document.getElementById('pPriceUSD').value) || 0;
        let link = document.getElementById('pLink').value;
        let qty = parseInt(document.getElementById('pQty').value) || 0;
        let desc = document.getElementById('pDesc').value;
        
        if (!name || isNaN(price_egp) || !link) {
            alert('املأ الاسم والسعر والرابط');
            return;
        }
        
        products.push({
            name: name,
            price_egp: price_egp,
            price_usd: price_usd,
            link: link,
            qty: qty,
            desc: desc
        });
        saveAll();
        
        document.getElementById('pName').value = '';
        document.getElementById('pPriceEGP').value = '';
        document.getElementById('pPriceUSD').value = '';
        document.getElementById('pLink').value = '';
        document.getElementById('pQty').value = '';
        document.getElementById('pDesc').value = '';
        
        refreshAll();
        alert('✅ تم الإضافة');
    };
    
    window.deleteItem = function(index) {
        if (confirm('حذف المنتج؟')) {
            products.splice(index, 1);
            saveAll();
            refreshAll();
        }
    };
    
    function refreshStore() {
        let currency = document.getElementById('currency').value;
        if (products.length === 0) {
            document.getElementById('storeItems').innerHTML = '<p>📭 لا توجد منتجات</p>';
            return;
        }
        let html = '';
        for (let i = 0; i < products.length; i++) {
            let p = products[i];
            let price = currency === 'egp' ? p.price_egp + ' ج.م' : p.price_usd + ' $';
            html += `<div class="product-card">
                        <h3>${p.name}</h3>
                        <p>${p.desc || 'منتج مميز'}</p>
                        <div class="price">${price}</div>
                        <div>المتاح: ${p.qty}</div>
                        <div><label>الكمية:</label>
                        <input type="number" id="buyQty_${i}" min="1" max="${p.qty}" value="1" style="width:70px"></div>
                        <button class="btn-success" onclick="buyItem(${i})">شراء</button>
                    </div>`;
        }
        document.getElementById('storeItems').innerHTML = html;
    }
    
    window.buyItem = function(index) {
        let qtyInput = document.getElementById(`buyQty_${index}`);
        let qty = qtyInput ? parseInt(qtyInput.value) : 1;
        let product = products[index];
        if (!product || !product.link) {
            alert('لا يوجد رابط شراء');
            return;
        }
        if (qty <= 0 || qty > product.qty) {
            alert('كمية غير صحيحة');
            return;
        }
        window.open(product.link, '_blank');
        product.qty -= qty;
        saveAll();
        refreshAll();
        alert(`✅ تم شراء ${qty} من ${product.name}`);
    };
    
    window.changeAdminPass = function() {
        let newPass = document.getElementById('newPass').value;
        let confirm = document.getElementById('confirmPass').value;
        if (!newPass) {
            document.getElementById('settingMsg').innerHTML = '✏️ أدخل كلمة سر جديدة';
            return;
        }
        if (newPass !== confirm) {
            document.getElementById('settingMsg').innerHTML = '❌ غير متطابقة';
            return;
        }
        adminPass = newPass;
        saveAll();
        document.getElementById('settingMsg').innerHTML = '✅ تم تغيير كلمة السر';
        document.getElementById('newPass').value = '';
        document.getElementById('confirmPass').value = '';
        setTimeout(() => document.getElementById('settingMsg').innerHTML = '', 2000);
    };
    
    window.showPanel = function(panel) {
        document.getElementById('dashboardPanel').style.display = panel === 'dashboard' ? 'block' : 'none';
        document.getElementById('storePanel').style.display = panel === 'store' ? 'block' : 'none';
        document.getElementById('settingsPanel').style.display = panel === 'settings' ? 'block' : 'none';
        if (panel === 'store') refreshStore();
    };
    
    // إذا كان مسجل قبل كده
    if (localStorage.getItem('logged_in') === 'yes') {
        document.getElementById('loginBox').classList.add('hidden');
        document.getElementById('mainBox').classList.remove('hidden');
        refreshAll();
        showPanel('dashboard');
    }
</script>
</body>
</html>
