<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>خزنتي الذكية</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', 'Tahoma', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 30px 20px;
        }

        /* الحاوية الرئيسية */
        .main-container {
            max-width: 1300px;
            margin: auto;
            background: white;
            border-radius: 45px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.2);
            overflow: hidden;
        }

        /* الرأس */
        .header {
            background: linear-gradient(135deg, #1e293b, #0f172a);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.2rem;
            margin-bottom: 8px;
        }

        .header p {
            opacity: 0.8;
        }

        /* أزرار التنقل */
        .navbar {
            display: flex;
            justify-content: center;
            gap: 15px;
            padding: 15px;
            background: #f8fafc;
            border-bottom: 2px solid #e2e8f0;
            flex-wrap: wrap;
        }

        .nav-btn {
            background: transparent;
            border: none;
            padding: 10px 30px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.3s;
            color: #334155;
        }

        .nav-btn.active {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            box-shadow: 0 5px 15px rgba(102,126,234,0.3);
        }

        .nav-btn:hover:not(.active) {
            background: #e2e8f0;
        }

        /* محتوى الصفحة */
        .content {
            padding: 35px;
        }

        /* شاشة تسجيل الدخول */
        .login-box {
            max-width: 450px;
            margin: 60px auto;
            background: white;
            border-radius: 40px;
            padding: 45px 35px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }

        .login-box h2 {
            color: #1e293b;
            margin-bottom: 25px;
        }

        .login-box input {
            width: 100%;
            padding: 14px;
            margin: 12px 0;
            border: 2px solid #e2e8f0;
            border-radius: 60px;
            font-size: 1rem;
            transition: 0.2s;
        }

        .login-box input:focus {
            border-color: #764ba2;
            outline: none;
        }

        /* الأزرار */
        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            color: white;
            padding: 12px 35px;
            border-radius: 60px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .btn-primary:hover {
            transform: scale(1.02);
        }

        .btn-success {
            background: linear-gradient(135deg, #10b981, #059669);
        }

        .btn-danger {
            background: linear-gradient(135deg, #ef4444, #dc2626);
        }

        .btn-warning {
            background: linear-gradient(135deg, #f59e0b, #d97706);
        }

        /* نماذج الإضافة */
        .form-card {
            background: #f1f5f9;
            padding: 25px;
            border-radius: 30px;
            margin-bottom: 35px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 15px;
        }

        input, textarea, select {
            border: 1px solid #cbd5e1;
            border-radius: 20px;
            padding: 12px 15px;
            width: 100%;
            font-size: 0.95rem;
        }

        textarea {
            resize: vertical;
        }

        /* بطاقات المنتجات */
        .products-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
        }

        .product-card {
            background: white;
            border-radius: 28px;
            padding: 20px;
            margin: 15px;
            width: 310px;
            display: inline-block;
            vertical-align: top;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
            transition: all 0.3s;
            border: 1px solid #e2e8f0;
        }

        .product-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 20px 35px rgba(0,0,0,0.12);
        }

        .price-tag {
            font-size: 28px;
            font-weight: 800;
            color: #0f172a;
            margin: 12px 0;
        }

        .currency-badge {
            background: #facc15;
            display: inline-block;
            padding: 5px 12px;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: bold;
        }

        /* الجدول */
        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 24px;
            overflow: hidden;
        }

        th, td {
            padding: 12px;
            text-align: center;
            border-bottom: 1px solid #e2e8f0;
        }

        th {
            background: #eef2ff;
        }

        .footer {
            text-align: center;
            padding: 20px;
            background: #f8fafc;
            color: #64748b;
            font-size: 0.8rem;
        }

        .error-msg {
            color: #ef4444;
            margin-top: 10px;
        }

        @media (max-width: 700px) {
            .product-card { width: 90%; margin: 15px auto; display: block; }
            .navbar { gap: 8px; }
            .nav-btn { padding: 8px 16px; font-size: 0.8rem; }
        }
    </style>
</head>
<body>
<div class="main-container" id="app">
    <div class="header">
        <h1>✨ خزنتي الذكية ✨</h1>
        <p>سجل منتجاتك، اختر العملة، واشتري برابط واحد</p>
    </div>

    <!-- شاشة تسجيل الدخول -->
    <div id="loginScreen">
        <div class="login-box">
            <h2>🔐 دخول المدير</h2>
            <input type="password" id="passwordInput" placeholder="أدخل كلمة السر">
            <button class="btn-primary" id="loginButton">دخول</button>
            <div id="loginError" class="error-msg"></div>
        </div>
    </div>

    <!-- الواجهة الرئيسية -->
    <div id="mainApp" style="display: none;">
        <div class="navbar">
            <button class="nav-btn" id="dashboardBtn">📦 إدارة المنتجات</button>
            <button class="nav-btn" id="storeBtn">🛍️ واجهة الشراء</button>
            <button class="nav-btn" id="settingsBtn">⚙️ الإعدادات</button>
            <button class="nav-btn" id="logoutBtn">🚪 خروج</button>
        </div>

        <div class="content">
            <!-- لوحة إدارة المنتجات -->
            <div id="dashboardPage">
                <div class="form-card">
                    <h3>➕ إضافة منتج جديد</h3>
                    <div class="form-grid">
                        <input type="text" id="prodName" placeholder="اسم المنتج *">
                        <input type="number" id="prodPriceEGP" placeholder="السعر بالجنيه *">
                        <input type="number" id="prodPriceUSD" placeholder="السعر بالدولار">
                        <input type="text" id="prodLink" placeholder="رابط الشراء *">
                        <input type="number" id="prodQty" placeholder="الكمية المتاحة">
                        <textarea id="prodDesc" rows="3" placeholder="وصف المنتج وأهميته..."></textarea>
                    </div>
                    <button class="btn-primary" id="addProductBtn">✨ أضف المنتج</button>
                </div>

                <h3>📋 المنتجات المسجلة</h3>
                <div id="productsTable" style="overflow-x: auto;"></div>
            </div>

            <!-- صفحة الشراء -->
            <div id="storePage" style="display: none;">
                <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; margin-bottom: 25px;">
                    <h2>🛍️ المنتجات المتاحة</h2>
                    <div style="background: #f1f5f9; padding: 8px 20px; border-radius: 60px;">
                        <span>💰 العملة: </span>
                        <select id="currencySelect">
                            <option value="egp">🇪🇬 جنيه مصري</option>
                            <option value="usd">🇺🇸 دولار أمريكي</option>
                        </select>
                    </div>
                </div>
                <div id="storeGrid" class="products-grid"></div>
            </div>

            <!-- صفحة الإعدادات -->
            <div id="settingsPage" style="display: none;">
                <div style="max-width: 550px; margin: 30px auto; background: #f1f5f9; padding: 35px; border-radius: 35px; text-align: center;">
                    <h3>🔐 تغيير كلمة السر</h3>
                    <input type="password" id="newPassword" placeholder="كلمة السر الجديدة" style="margin-bottom: 15px;">
                    <input type="password" id="confirmPassword" placeholder="تأكيد كلمة السر" style="margin-bottom: 25px;">
                    <button class="btn-primary btn-warning" id="changePassBtn">تحديث كلمة السر</button>
                    <div id="passMsg" style="margin-top: 15px;"></div>
                </div>
            </div>
        </div>
        <div class="footer">
            🧠 جميع منتجاتك محفوظة في متصفحك — آمنة وسريعة
        </div>
    </div>
</div>

<script>
    (function() {
        // ========== إدارة التخزين ==========
        const STORAGE_KEY = 'my_store_simple';
        const DEFAULT_PASS = '1234';

        // تحميل البيانات
        let appData = localStorage.getItem(STORAGE_KEY);
        if (!appData) {
            appData = {
                adminPass: DEFAULT_PASS,
                products: []
            };
            localStorage.setItem(STORAGE_KEY, JSON.stringify(appData));
        } else {
            appData = JSON.parse(appData);
        }

        let products = appData.products;
        let adminPassword = appData.adminPass;

        // حفظ البيانات
        function saveData() {
            appData.products = products;
            appData.adminPass = adminPassword;
            localStorage.setItem(STORAGE_KEY, JSON.stringify(appData));
        }

        // ========== دوال تسجيل الدخول ==========
        function doLogin() {
            let enteredPass = document.getElementById('passwordInput').value;
            
            if (enteredPass === adminPassword) {
                localStorage.setItem('admin_logged', 'yes');
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('mainApp').style.display = 'block';
                document.getElementById('loginError').innerHTML = '';
                loadProducts();
                showPage('dashboard');
            } else {
                document.getElementById('loginError').innerHTML = '⚠️ كلمة سر غير صحيحة';
            }
        }

        function logout() {
            localStorage.removeItem('admin_logged');
            document.getElementById('loginScreen').style.display = 'block';
            document.getElementById('mainApp').style.display = 'none';
            document.getElementById('passwordInput').value = '';
            document.getElementById('loginError').innerHTML = '';
        }

        // ========== إدارة المنتجات ==========
        function loadProducts() {
            showDashboard();
            showStore();
        }

        function showDashboard() {
            if (products.length === 0) {
                document.getElementById('productsTable').innerHTML = '<p style="text-align:center;">✨ لا توجد منتجات، أضف منتجك الأول</p>';
                return;
            }

            let html = `<table><thead>汽<th>المنتج</th><th>السعر (EGP)</th><th>السعر (USD)</th><th>الكمية</th><th>الرابط</th><th>مسح</th></tr></thead><tbody>`;
            for (let i = 0; i < products.length; i++) {
                let p = products[i];
                html += `<tr>
                            <td><strong>${escapeHtml(p.name)}</strong><br><small>${escapeHtml((p.description || '').substring(0,40))}</small></td>
                            <td>${p.price_egp} ج.م</td><td>${p.price_usd} $</td>
                            <td>${p.quantity}</td>
                            <td><a href="${p.purchase_link}" target="_blank">🔗 رابط</a></td>
                            <td><button class="btn-primary btn-danger" onclick="deleteProduct(${i})" style="padding: 5px 15px;">🗑️ حذف</button></td>
                        </tr>`;
            }
            html += `</tbody></table>`;
            document.getElementById('productsTable').innerHTML = html;
        }

        function addProduct() {
            let name = document.getElementById('prodName').value;
            let price_egp = parseFloat(document.getElementById('prodPriceEGP').value);
            let price_usd = parseFloat(document.getElementById('prodPriceUSD').value) || 0;
            let link = document.getElementById('prodLink').value;
            let qty = parseInt(document.getElementById('prodQty').value) || 0;
            let desc = document.getElementById('prodDesc').value;

            if (!name || isNaN(price_egp) || !link) {
                alert('✏️ يرجى ملء اسم المنتج، السعر، ورابط الشراء');
                return;
            }

            products.push({
                name: name,
                price_egp: price_egp,
                price_usd: price_usd,
                purchase_link: link,
                quantity: qty,
                description: desc
            });
            saveData();

            // تفريغ الحقول
            document.getElementById('prodName').value = '';
            document.getElementById('prodPriceEGP').value = '';
            document.getElementById('prodPriceUSD').value = '';
            document.getElementById('prodLink').value = '';
            document.getElementById('prodQty').value = '';
            document.getElementById('prodDesc').value = '';

            loadProducts();
            alert('✅ تم إضافة المنتج بنجاح');
        }

        window.deleteProduct = function(index) {
            if (confirm('هل أنت متأكد من حذف هذا المنتج؟')) {
                products.splice(index, 1);
                saveData();
                loadProducts();
                alert('✅ تم حذف المنتج');
            }
        };

        // ========== صفحة الشراء ==========
        function showStore() {
            let currency = document.getElementById('currencySelect').value;
            if (products.length === 0) {
                document.getElementById('storeGrid').innerHTML = '<p style="text-align:center;">📭 لا توجد منتجات، أضف منتجات من لوحة الإدارة</p>';
                return;
            }

            let html = '';
            for (let i = 0; i < products.length; i++) {
                let p = products[i];
                let price = currency === 'egp' ? p.price_egp + ' ج.م' : p.price_usd + ' $';
                html += `<div class="product-card">
                            <h3>🌟 ${escapeHtml(p.name)}</h3>
                            <p>${escapeHtml(p.description || 'منتج مميز بأفضل سعر')}</p>
                            <div class="price-tag">${price}</div>
                            <div class="currency-badge">📦 متاح: ${p.quantity} قطعة</div>
                            <div style="margin: 15px 0;">
                                <label>الكمية: </label>
                                <input type="number" id="qty_${i}" min="1" max="${p.quantity}" value="1" style="width: 85px; display: inline-block;">
                            </div>
                            <button class="btn-primary btn-success" onclick="buyProduct(${i})" style="width: 100%;">🛒 شراء الآن</button>
                        </div>`;
            }
            document.getElementById('storeGrid').innerHTML = html;
        }

        window.buyProduct = function(index) {
            let qtyInput = document.getElementById(`qty_${index}`);
            let qty = qtyInput ? parseInt(qtyInput.value) : 1;
            let product = products[index];

            if (!product || !product.purchase_link) {
                alert('لا يوجد رابط شراء لهذا المنتج');
                return;
            }
            if (qty <= 0 || qty > product.quantity) {
                alert('الكمية غير صحيحة أو أكبر من المتاح');
                return;
            }

            window.open(product.purchase_link, '_blank');
            product.quantity -= qty;
            saveData();
            loadProducts();
            alert(`✅ تم شراء ${qty} من ${product.name} بنجاح!\n📦 الكمية المتبقية: ${product.quantity}`);
        };

        // ========== الإعدادات ==========
        function changePassword() {
            let newPass = document.getElementById('newPassword').value;
            let confirmPass = document.getElementById('confirmPassword').value;

            if (!newPass) {
                document.getElementById('passMsg').innerHTML = '✏️ اكتب كلمة سر جديدة';
                document.getElementById('passMsg').style.color = 'red';
                return;
            }
            if (newPass !== confirmPass) {
                document.getElementById('passMsg').innerHTML = '❌ كلمتا السر غير متطابقتين';
                document.getElementById('passMsg').style.color = 'red';
                return;
            }

            adminPassword = newPass;
            saveData();
            document.getElementById('passMsg').innerHTML = '✅ تم تغيير كلمة السر بنجاح';
            document.getElementById('passMsg').style.color = 'green';
            document.getElementById('newPassword').value = '';
            document.getElementById('confirmPassword').value = '';
            setTimeout(() => { document.getElementById('passMsg').innerHTML = ''; }, 2000);
        }

        // ========== دوال مساعدة ==========
        function showPage(page) {
            document.getElementById('dashboardPage').style.display = page === 'dashboard' ? 'block' : 'none';
            document.getElementById('storePage').style.display = page === 'store' ? 'block' : 'none';
            document.getElementById('settingsPage').style.display = page === 'settings' ? 'block' : 'none';

            let dashBtn = document.getElementById('dashboardBtn');
            let storeBtn = document.getElementById('storeBtn');
            let settingsBtn = document.getElementById('settingsBtn');

            if (dashBtn) dashBtn.classList.toggle('active', page === 'dashboard');
            if (storeBtn) storeBtn.classList.toggle('active', page === 'store');
            if (settingsBtn) settingsBtn.classList.toggle('active', page === 'settings');

            if (page === 'store') showStore();
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        // ========== ربط الأحداث (Event Listeners) ==========
        document.getElementById('loginButton').addEventListener('click', doLogin);
        document.getElementById('addProductBtn').addEventListener('click', addProduct);
        document.getElementById('changePassBtn').addEventListener('click', changePassword);
        document.getElementById('logoutBtn').addEventListener('click', logout);
        document.getElementById('dashboardBtn').addEventListener('click', () => showPage('dashboard'));
        document.getElementById('storeBtn').addEventListener('click', () => showPage('store'));
        document.getElementById('settingsBtn').addEventListener('click', () => showPage('settings'));
        document.getElementById('currencySelect').addEventListener('change', showStore);

        // ========== التحقق من تسجيل الدخول عند تحميل الصفحة ==========
        if (localStorage.getItem('admin_logged') === 'yes') {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('mainApp').style.display = 'block';
            loadProducts();
            showPage('dashboard');
        }
    })();
</script>
</body>
</html>
