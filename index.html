<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <title>خزنتي - نسخة بسيطة</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Tahoma', 'Cairo', sans-serif;
        }
        body {
            background: linear-gradient(135deg, #667eea, #764ba2);
            padding: 20px;
        }
        .box {
            max-width: 1200px;
            margin: auto;
            background: white;
            border-radius: 30px;
            padding: 20px;
        }
        .header {
            background: #1e293b;
            color: white;
            padding: 20px;
            border-radius: 20px;
            text-align: center;
            margin-bottom: 20px;
        }
        button, .btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 30px;
            cursor: pointer;
            margin: 5px;
            font-size: 16px;
        }
        .btn-danger { background: #ef4444; }
        .btn-success { background: #10b981; }
        input, textarea, select {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border: 1px solid #ddd;
            border-radius: 15px;
        }
        .product-card {
            border: 1px solid #eee;
            border-radius: 20px;
            padding: 15px;
            margin: 10px;
            width: 280px;
            display: inline-block;
            vertical-align: top;
            background: #f9f9f9;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 10px;
            border-bottom: 1px solid #ddd;
            text-align: center;
        }
        .nav-bar {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .form-card {
            background: #f1f5f9;
            padding: 20px;
            border-radius: 20px;
            margin-bottom: 20px;
        }
        .login-area {
            max-width: 400px;
            margin: 100px auto;
            background: white;
            padding: 40px;
            border-radius: 30px;
            text-align: center;
        }
        .price { font-size: 24px; font-weight: bold; margin: 10px 0; }
        .error { color: red; margin-top: 10px; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div id="app">
    <!-- شاشة تسجيل الدخول -->
    <div id="loginSection" class="login-area">
        <h2>🔐 دخول المدير</h2>
        <input type="password" id="passInput" placeholder="كلمة السر">
        <button onclick="checkLogin()">دخول</button>
        <div id="loginMessage" class="error"></div>
        <p style="margin-top:20px; color:#888;">كلمة السر: 1234</p>
    </div>

    <!-- المحتوى الرئيسي -->
    <div id="mainSection" class="box hidden">
        <div class="header">
            <h1>📦 خزنتي الذكية</h1>
        </div>

        <div class="nav-bar">
            <button onclick="showPage('dashboard')">📋 إدارة المنتجات</button>
            <button onclick="showPage('store')">🛒 الشراء</button>
            <button onclick="showPage('settings')">⚙️ الإعدادات</button>
            <button onclick="logout()">🚪 خروج</button>
        </div>

        <!-- صفحة الإدارة -->
        <div id="dashboardPage">
            <div class="form-card">
                <h3>➕ إضافة منتج</h3>
                <input type="text" id="prodName" placeholder="اسم المنتج">
                <input type="number" id="prodPriceEGP" placeholder="السعر بالجنيه">
                <input type="number" id="prodPriceUSD" placeholder="السعر بالدولار">
                <input type="text" id="prodLink" placeholder="رابط الشراء">
                <input type="number" id="prodQty" placeholder="الكمية">
                <textarea id="prodDesc" rows="2" placeholder="الوصف"></textarea>
                <button onclick="addProduct()">➕ إضافة</button>
            </div>
            <h3>المنتجات الحالية</h3>
            <div id="productsTable"></div>
        </div>

        <!-- صفحة الشراء -->
        <div id="storePage" class="hidden">
            <div style="display: flex; justify-content: space-between; margin-bottom: 15px;">
                <h3>🛍️ المنتجات</h3>
                <select id="currency" onchange="showStore()">
                    <option value="egp">🇪🇬 جنيه</option>
                    <option value="usd">🇺🇸 دولار</option>
                </select>
            </div>
            <div id="storeGrid"></div>
        </div>

        <!-- صفحة الإعدادات -->
        <div id="settingsPage" class="hidden">
            <div class="form-card">
                <h3>🔐 تغيير كلمة السر</h3>
                <input type="password" id="newPass" placeholder="كلمة السر الجديدة">
                <input type="password" id="confirmNewPass" placeholder="تأكيد كلمة السر">
                <button onclick="changePassword()">💾 حفظ</button>
                <div id="settingsMsg" style="margin-top: 10px;"></div>
            </div>
        </div>
    </div>
</div>

<script>
    // مفتاح التخزين
    const STORAGE_KEY = 'my_simple_store';
    
    // تحميل البيانات
    let data = localStorage.getItem(STORAGE_KEY);
    if (!data) {
        data = {
            password: '1234',
            products: []
        };
        localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    } else {
        data = JSON.parse(data);
    }
    
    let products = data.products;
    let adminPass = data.password;
    
    // دالة لتحديث التخزين
    function saveData() {
        data.products = products;
        data.password = adminPass;
        localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    }
    
    // تسجيل الدخول
    window.checkLogin = function() {
        let pass = document.getElementById('passInput').value;
        if (pass === adminPass) {
            localStorage.setItem('logged', 'yes');
            document.getElementById('loginSection').classList.add('hidden');
            document.getElementById('mainSection').classList.remove('hidden');
            document.getElementById('loginMessage').innerHTML = '';
            loadAll();
            showPage('dashboard');
        } else {
            document.getElementById('loginMessage').innerHTML = '⚠️ كلمة سر خطأ';
        }
    };
    
    window.logout = function() {
        localStorage.removeItem('logged');
        document.getElementById('loginSection').classList.remove('hidden');
        document.getElementById('mainSection').classList.add('hidden');
        document.getElementById('passInput').value = '';
    };
    
    function loadAll() {
        showDashboard();
        showStore();
    }
    
    function showDashboard() {
        if (products.length === 0) {
            document.getElementById('productsTable').innerHTML = '<p>✨ لا توجد منتجات</p>';
            return;
        }
        let html = `<table><thead>汽<th>المنتج</th><th>جنيه</th><th>دولار</th><th>الكمية</th><th>الرابط</th><th></th></thead><tbody>`;
        for (let i = 0; i < products.length; i++) {
            let p = products[i];
            html += `<tr>
                        <td><strong>${p.name}</strong><br><small>${(p.desc || '').substring(0,30)}</small></td>
                        <td>${p.price_egp} ج.م</td>
                        <td>${p.price_usd} $</td>
                        <td>${p.qty}</td>
                        <td><a href="${p.link}" target="_blank">رابط</a></td>
                        <td><button class="btn-danger" onclick="deleteProduct(${i})">حذف</button></td>
                    </tr>`;
        }
        html += `</tbody></table>`;
        document.getElementById('productsTable').innerHTML = html;
    }
    
    window.addProduct = function() {
        let name = document.getElementById('prodName').value;
        let price_egp = parseFloat(document.getElementById('prodPriceEGP').value);
        let price_usd = parseFloat(document.getElementById('prodPriceUSD').value) || 0;
        let link = document.getElementById('prodLink').value;
        let qty = parseInt(document.getElementById('prodQty').value) || 0;
        let desc = document.getElementById('prodDesc').value;
        
        if (!name || isNaN(price_egp) || !link) {
            alert('املأ البيانات الأساسية');
            return;
        }
        
        products.push({
            name: name,
            price_egp: price_egp,
            price_usd: price_usd,
            link: link,
            qty: qty,
            desc: desc
        });
        saveData();
        
        document.getElementById('prodName').value = '';
        document.getElementById('prodPriceEGP').value = '';
        document.getElementById('prodPriceUSD').value = '';
        document.getElementById('prodLink').value = '';
        document.getElementById('prodQty').value = '';
        document.getElementById('prodDesc').value = '';
        
        loadAll();
        alert('✅ تم الإضافة');
    };
    
    window.deleteProduct = function(index) {
        if (confirm('حذف؟')) {
            products.splice(index, 1);
            saveData();
            loadAll();
        }
    };
    
    function showStore() {
        let currency = document.getElementById('currency').value;
        if (products.length === 0) {
            document.getElementById('storeGrid').innerHTML = '<p>لا توجد منتجات</p>';
            return;
        }
        let html = '';
        for (let i = 0; i < products.length; i++) {
            let p = products[i];
            let price = currency === 'egp' ? p.price_egp + ' ج.م' : p.price_usd + ' $';
            html += `<div class="product-card">
                        <h3>${p.name}</h3>
                        <p>${p.desc || 'منتج مميز'}</p>
                        <div class="price">${price}</div>
                        <div>المتاح: ${p.qty}</div>
                        <div><label>الكمية:</label>
                        <input type="number" id="qty_${i}" min="1" max="${p.qty}" value="1" style="width:70px"></div>
                        <button class="btn-success" onclick="buyProduct(${i})">شراء</button>
                    </div>`;
        }
        document.getElementById('storeGrid').innerHTML = html;
    }
    
    window.buyProduct = function(index) {
        let qtyInput = document.getElementById(`qty_${index}`);
        let qty = qtyInput ? parseInt(qtyInput.value) : 1;
        let product = products[index];
        if (!product || !product.link) {
            alert('لا يوجد رابط');
            return;
        }
        if (qty <= 0 || qty > product.qty) {
            alert('كمية غير صالحة');
            return;
        }
        window.open(product.link, '_blank');
        product.qty -= qty;
        saveData();
        loadAll();
        alert(`تم شراء ${qty} من ${product.name}`);
    };
    
    window.changePassword = function() {
        let newPass = document.getElementById('newPass').value;
        let confirm = document.getElementById('confirmNewPass').value;
        if (!newPass) {
            document.getElementById('settingsMsg').innerHTML = 'أدخل كلمة سر جديدة';
            return;
        }
        if (newPass !== confirm) {
            document.getElementById('settingsMsg').innerHTML = 'غير متطابقة';
            return;
        }
        adminPass = newPass;
        saveData();
        document.getElementById('settingsMsg').innerHTML = '✅ تم التغيير';
        document.getElementById('newPass').value = '';
        document.getElementById('confirmNewPass').value = '';
        setTimeout(() => document.getElementById('settingsMsg').innerHTML = '', 2000);
    };
    
    window.showPage = function(page) {
        document.getElementById('dashboardPage').style.display = page === 'dashboard' ? 'block' : 'none';
        document.getElementById('storePage').style.display = page === 'store' ? 'block' : 'none';
        document.getElementById('settingsPage').style.display = page === 'settings' ? 'block' : 'none';
        if (page === 'store') showStore();
    };
    
    // التحقق من تسجيل الدخول السابق
    if (localStorage.getItem('logged') === 'yes') {
        document.getElementById('loginSection').classList.add('hidden');
        document.getElementById('mainSection').classList.remove('hidden');
        loadAll();
        showPage('dashboard');
    }
</script>
</body>
</html>
