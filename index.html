<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>اللهم صل على النبي 🤲 - نظام إدارة المنتجات</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Tajawal', 'Segoe UI', system-ui, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .app-container {
            max-width: 1300px;
            margin: 0 auto;
        }

        .login-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(145deg, #0a0f1e, #0f172a);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            border-radius: 60px;
            padding: 45px 35px;
            width: 90%;
            max-width: 440px;
            border: 1px solid rgba(250, 204, 21, 0.3);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            animation: fadeInUp 0.5s ease;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .login-card h2 {
            color: #facc15;
            text-align: center;
            margin-bottom: 30px;
        }

        .login-card input {
            width: 100%;
            padding: 15px 20px;
            margin-bottom: 20px;
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 50px;
            color: white;
            font-size: 1rem;
        }

        .login-card input:focus {
            outline: none;
            border-color: #facc15;
        }

        .login-card button {
            width: 100%;
            padding: 14px;
            background: #facc15;
            border: none;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: bold;
            color: #0f172a;
            cursor: pointer;
            transition: 0.1s;
        }

        .login-card button:active {
            transform: scale(0.97);
        }

        .login-error {
            color: #ef4444;
            text-align: center;
            margin-top: 15px;
        }

        .main-content {
            display: none;
            animation: fadeIn 0.5s;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(12px);
            padding: 15px 25px;
            border-radius: 60px;
            margin-bottom: 25px;
        }

        .logo h1 {
            color: #facc15;
            font-size: 1.5rem;
        }

        .logo p {
            color: #94a3b8;
            font-size: 0.8rem;
        }

        .user-area {
            display: flex;
            gap: 12px;
        }

        .change-pw-btn, .logout-btn {
            border: none;
            padding: 8px 20px;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
        }

        .change-pw-btn:active, .logout-btn:active {
            transform: scale(0.96);
        }

        .change-pw-btn { background: #3b82f6; color: white; }
        .logout-btn { background: #ef4444; color: white; }

        .add-product-form {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 40px;
            padding: 25px;
            margin-bottom: 30px;
        }

        .form-title {
            color: #facc15;
            margin-bottom: 20px;
            font-size: 1.3rem;
        }

        .form-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 18px;
            margin-bottom: 18px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-group label {
            color: #facc15;
            font-weight: bold;
        }

        .form-group input, .form-group textarea {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 30px;
            padding: 12px 16px;
            color: white;
            font-size: 0.95rem;
        }

        .form-group input:focus, .form-group textarea:focus {
            outline: none;
            border-color: #facc15;
        }

        .submit-btn {
            background: #facc15;
            color: #0f172a;
            border: none;
            padding: 12px 28px;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.1s;
        }

        .submit-btn:active {
            transform: scale(0.97);
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 22px;
            margin-top: 25px;
        }

        .product-card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(8px);
            border-radius: 36px;
            padding: 22px;
            border: 1px solid rgba(250, 204, 21, 0.2);
            transition: 0.3s;
        }

        .product-card:hover {
            transform: translateY(-5px);
            border-color: #facc15;
        }

        .product-name {
            font-size: 1.5rem;
            font-weight: bold;
            color: #facc15;
            margin-bottom: 12px;
        }

        .product-desc {
            color: #cbd5e1;
            margin-bottom: 15px;
        }

        .product-prices {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
        }

        .price-egp {
            background: #22c55e20;
            padding: 6px 14px;
            border-radius: 50px;
            color: #22c55e;
        }

        .price-usd {
            background: #3b82f620;
            padding: 6px 14px;
            border-radius: 50px;
            color: #3b82f6;
        }

        .product-link a {
            color: #facc15;
            text-decoration: none;
        }

        .product-additional {
            color: #94a3b8;
            font-size: 0.85rem;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid #334155;
        }

        .delete-product {
            margin-top: 15px;
            background: #ef4444;
            border: none;
            padding: 8px 16px;
            border-radius: 30px;
            color: white;
            cursor: pointer;
        }

        .delete-product:active {
            transform: scale(0.96);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1100;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: #1e293b;
            border-radius: 50px;
            padding: 35px;
            width: 90%;
            max-width: 450px;
            border: 2px solid #facc15;
        }

        .modal-content h3 {
            color: #facc15;
            margin-bottom: 25px;
            text-align: center;
        }

        .modal-content input {
            width: 100%;
            padding: 14px;
            margin-bottom: 18px;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 50px;
            color: white;
        }

        .modal-buttons {
            display: flex;
            gap: 12px;
        }

        .modal-buttons button {
            flex: 1;
            padding: 12px;
            border-radius: 50px;
            border: none;
            cursor: pointer;
        }

        .save-pw { background: #22c55e; color: white; }
        .cancel-pw { background: #475569; color: white; }

        .message {
            position: fixed;
            bottom: 25px;
            right: 25px;
            background: #22c55e;
            color: white;
            padding: 12px 24px;
            border-radius: 50px;
            display: none;
            z-index: 1200;
        }

        .footer {
            text-align: center;
            margin-top: 40px;
            padding: 20px;
            color: #64748b;
            font-size: 0.8rem;
            border-top: 1px solid #334155;
        }

        .footer a {
            color: #facc15;
            text-decoration: none;
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="login-screen" id="loginScreen">
        <div class="login-card">
            <h2>🤲 اللهم صل على النبي</h2>
            <h2 style="font-size:1.2rem;">🔐 تسجيل الدخول</h2>
            <input type="email" id="loginEmail" placeholder="البريد الإلكتروني" value="admin@example.com">
            <input type="password" id="loginPassword" placeholder="كلمة السر" value="123456">
            <button id="doLoginBtn">دخول</button>
            <div class="login-error" id="loginError"></div>
            <p style="color:#94a3b8; font-size:0.7rem; text-align:center; margin-top:20px;">admin@example.com / 123456</p>
        </div>
    </div>

    <div class="main-content" id="mainContent">
        <div class="header">
            <div class="logo">
                <h1>🛍️ نظام إدارة المنتجات</h1>
                <p>اللهم صل على محمد وعلى آل محمد 🤲</p>
            </div>
            <div class="user-area">
                <button class="change-pw-btn" id="changePwBtn">🔑 تغيير كلمة السر</button>
                <button class="logout-btn" id="logoutBtn">🚪 تسجيل خروج</button>
            </div>
        </div>

        <div class="add-product-form">
            <div class="form-title">➕ إضافة منتج جديد</div>
            <div class="form-row">
                <div class="form-group">
                    <label>📦 1. اسم المنتج *</label>
                    <input type="text" id="prodName" placeholder="مثال: لابتوب احترافي">
                </div>
                <div class="form-group">
                    <label>📝 2. الوصف الأول *</label>
                    <input type="text" id="prodDesc" placeholder="وصف مختصر">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>💰 3. السعر بالجنيه *</label>
                    <input type="number" id="prodPriceEGP" placeholder="مثال: 25000">
                </div>
                <div class="form-group">
                    <label>💵 4. السعر بالدولار *</label>
                    <input type="number" id="prodPriceUSD" placeholder="مثال: 520">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>🔗 5. رابط المنتج</label>
                    <input type="url" id="prodLink" placeholder="https://example.com">
                </div>
                <div class="form-group">
                    <label>📋 6. الوصف الإضافي</label>
                    <textarea id="prodAdditional" rows="2" placeholder="تفاصيل إضافية"></textarea>
                </div>
            </div>
            <button class="submit-btn" id="addProductBtn">✨ إضافة المنتج</button>
        </div>

        <div class="products-grid" id="productsGrid"></div>
        
        <div class="footer">
            <p>🔗 <a href="https://github.com/Youssefelsayed12/Black-Lego-.git" target="_blank">github.com/Youssefelsayed12/Black-Lego</a></p>
            <p>🤲 اللهم صل على سيدنا محمد وعلى آله وصحبه أجمعين</p>
        </div>
    </div>
</div>

<div class="modal" id="changePwModal">
    <div class="modal-content">
        <h3>🔐 تغيير كلمة السر</h3>
        <input type="password" id="currentPassword" placeholder="كلمة السر الحالية">
        <input type="password" id="newPassword" placeholder="كلمة السر الجديدة">
        <input type="password" id="confirmPassword" placeholder="تأكيد كلمة السر الجديدة">
        <div class="modal-buttons">
            <button class="save-pw" id="savePasswordBtn">💾 حفظ</button>
            <button class="cancel-pw" id="cancelPwBtn">إلغاء</button>
        </div>
    </div>
</div>

<div class="message" id="messageToast">✅ تمت العملية</div>

<script>
    let DEFAULT_EMAIL = "admin@example.com";
    let DEFAULT_PASSWORD = "123456";
    let products = [];

    function saveProducts() {
        localStorage.setItem('products_local', JSON.stringify(products));
    }

    function loadProducts() {
        const saved = localStorage.getItem('products_local');
        if(saved) {
            products = JSON.parse(saved);
        } else {
            products = [
                { id: 1, name: "لابتوب احترافي", description: "لابتوب بشاشة 15.6 بوصة", priceEGP: 25000, priceUSD: 520, link: "https://example.com/laptop", additionalDesc: "ضمان سنتين" },
                { id: 2, name: "ماوس لاسلكي", description: "ماوس عالي الدقة", priceEGP: 450, priceUSD: 9.50, link: "https://example.com/mouse", additionalDesc: "يدعم Bluetooth" },
                { id: 3, name: "شاشة 24 بوصة", description: "شاشة Full HD", priceEGP: 5500, priceUSD: 115, link: "https://example.com/monitor", additionalDesc: "مناسبة للألعاب" }
            ];
            saveProducts();
        }
        renderProducts();
    }

    function renderProducts() {
        const grid = document.getElementById('productsGrid');
        if(!grid) return;
        
        if(products.length === 0) {
            grid.innerHTML = '<div style="color:#94a3b8; text-align:center; padding:60px;">📭 لا توجد منتجات</div>';
            return;
        }
        
        grid.innerHTML = products.map(prod => `
            <div class="product-card">
                <div class="product-name">${escapeHtml(prod.name)}</div>
                <div class="product-desc">📌 ${escapeHtml(prod.description)}</div>
                <div class="product-prices">
                    <span class="price-egp">🇪🇬 ${prod.priceEGP.toLocaleString()} جنيه</span>
                    <span class="price-usd">🇺🇸 ${prod.priceUSD.toLocaleString()} دولار</span>
                </div>
                ${prod.link ? `<div class="product-link">🔗 <a href="${escapeHtml(prod.link)}" target="_blank">${escapeHtml(prod.link)}</a></div>` : ''}
                <div class="product-additional">📎 ${escapeHtml(prod.additionalDesc) || 'لا يوجد وصف إضافي'}</div>
                <button class="delete-product" onclick="deleteProduct(${prod.id})">🗑 حذف</button>
            </div>
        `).join('');
    }

    function addProduct(name, desc, priceEGP, priceUSD, link, additional) {
        if(!name || !desc || !priceEGP || !priceUSD) {
            showMessage('❌ يرجى ملء الحقول المطلوبة', true);
            return false;
        }
        const newId = products.length > 0 ? Math.max(...products.map(p => p.id)) + 1 : 1;
        products.push({
            id: newId,
            name: name.trim(),
            description: desc.trim(),
            priceEGP: parseFloat(priceEGP),
            priceUSD: parseFloat(priceUSD),
            link: link || '',
            additionalDesc: additional || ''
        });
        saveProducts();
        renderProducts();
        showMessage('✅ تم إضافة المنتج');
        return true;
    }

    window.deleteProduct = function(id) {
        if(confirm('هل أنت متأكد من الحذف؟')) {
            products = products.filter(p => p.id !== id);
            saveProducts();
            renderProducts();
            showMessage('🗑 تم الحذف');
        }
    };

    function login(email, password) {
        if(email === DEFAULT_EMAIL && password === DEFAULT_PASSWORD) {
            localStorage.setItem('isLoggedIn', 'true');
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('mainContent').style.display = 'block';
            loadProducts();
            showMessage("✨ تم تسجيل الدخول");
            return true;
        } else {
            document.getElementById('loginError').innerText = '❌ غير صحيح';
            return false;
        }
    }

    function logout() {
        localStorage.removeItem('isLoggedIn');
        document.getElementById('loginScreen').style.display = 'flex';
        document.getElementById('mainContent').style.display = 'none';
        showMessage("🚪 تم الخروج");
    }

    function checkSession() {
        if(localStorage.getItem('isLoggedIn') === 'true') {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('mainContent').style.display = 'block';
            loadProducts();
        }
    }

    function changePassword(current, newPass, confirm) {
        if(current !== DEFAULT_PASSWORD) {
            showMessage('❌ كلمة السر الحالية غير صحيحة', true);
            return false;
        }
        if(newPass.length < 4) {
            showMessage('❌ 4 أحرف على الأقل', true);
            return false;
        }
        if(newPass !== confirm) {
            showMessage('❌ غير متطابقتين', true);
            return false;
        }
        DEFAULT_PASSWORD = newPass;
        showMessage('✅ تم تغيير كلمة السر');
        return true;
    }

    function showMessage(text, isError = false) {
        const toast = document.getElementById('messageToast');
        toast.textContent = text;
        toast.style.background = isError ? '#ef4444' : '#22c55e';
        toast.style.display = 'block';
        setTimeout(() => toast.style.display = 'none', 2500);
    }

    function escapeHtml(str) {
        if(!str) return '';
        return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
    }

    document.getElementById('doLoginBtn')?.addEventListener('click', () => {
        login(document.getElementById('loginEmail').value, document.getElementById('loginPassword').value);
    });

    document.getElementById('logoutBtn')?.addEventListener('click', logout);
    
    document.getElementById('addProductBtn')?.addEventListener('click', () => {
        addProduct(
            document.getElementById('prodName').value,
            document.getElementById('prodDesc').value,
            document.getElementById('prodPriceEGP').value,
            document.getElementById('prodPriceUSD').value,
            document.getElementById('prodLink').value,
            document.getElementById('prodAdditional').value
        );
        document.getElementById('prodName').value = '';
        document.getElementById('prodDesc').value = '';
        document.getElementById('prodPriceEGP').value = '';
        document.getElementById('prodPriceUSD').value = '';
        document.getElementById('prodLink').value = '';
        document.getElementById('prodAdditional').value = '';
    });

    const modal = document.getElementById('changePwModal');
    document.getElementById('changePwBtn')?.addEventListener('click', () => modal.style.display = 'flex');
    document.getElementById('cancelPwBtn')?.addEventListener('click', () => modal.style.display = 'none');
    document.getElementById('savePasswordBtn')?.addEventListener('click', () => {
        if(changePassword(
            document.getElementById('currentPassword').value,
            document.getElementById('newPassword').value,
            document.getElementById('confirmPassword').value
        )) modal.style.display = 'none';
    });

    checkSession();
</script>
</body>
</html>
