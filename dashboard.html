<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم - خزنتي</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', 'Tahoma', sans-serif; }
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 1300px; margin: auto; background: white; border-radius: 45px; overflow: hidden; box-shadow: 0 25px 50px rgba(0,0,0,0.2); }
        .header { background: #1e293b; color: white; padding: 25px; text-align: center; }
        .navbar { display: flex; justify-content: center; gap: 15px; padding: 15px; background: #f8fafc; flex-wrap: wrap; border-bottom: 2px solid #e2e8f0; }
        .nav-btn { background: transparent; border: none; padding: 10px 25px; font-weight: bold; border-radius: 40px; cursor: pointer; }
        .nav-btn.active { background: #667eea; color: white; }
        .content { padding: 30px; }
        .form-card { background: #f1f5f9; padding: 25px; border-radius: 30px; margin-bottom: 30px; }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 15px; }
        input, textarea { border: 1px solid #cbd5e1; border-radius: 20px; padding: 12px; width: 100%; }
        .btn-primary { background: #667eea; color: white; border: none; padding: 12px 30px; border-radius: 40px; cursor: pointer; font-weight: bold; }
        .btn-danger { background: #ef4444; }
        .btn-success { background: #10b981; }
        .product-card { background: white; border-radius: 25px; padding: 20px; margin: 15px; width: 300px; display: inline-block; vertical-align: top; box-shadow: 0 5px 15px rgba(0,0,0,0.1); border: 1px solid #e2e8f0; }
        .price { font-size: 24px; font-weight: bold; color: #1e293b; margin: 10px 0; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; border-bottom: 1px solid #e2e8f0; text-align: center; }
        th { background: #eef2ff; }
        .loading { text-align: center; padding: 40px; color: #667eea; }
        .footer { text-align: center; padding: 20px; background: #f8fafc; color: #64748b; }
        @media (max-width: 700px) { .product-card { width: 90%; margin: 10px auto; display: block; } }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>☁️ خزنتي السحابية</h1>
        <p>منتجاتك على Supabase</p>
    </div>
    <div class="navbar">
        <button class="nav-btn" id="btnDash" onclick="showPage('dashboard')">📦 إدارة المنتجات</button>
        <button class="nav-btn" id="btnStore" onclick="showPage('store')">🛍️ الشراء</button>
        <button class="nav-btn" id="btnSettings" onclick="showPage('settings')">⚙️ إعدادات</button>
        <button class="nav-btn" onclick="logout()">🚪 خروج</button>
    </div>
    <div class="content">
        <div id="loading" class="loading" style="display:none;">⏳ جاري التحميل...</div>
        
        <!-- صفحة الإدارة -->
        <div id="dashboardPage">
            <div class="form-card">
                <h3>➕ إضافة منتج جديد</h3>
                <div class="form-grid">
                    <input type="text" id="name" placeholder="اسم المنتج *">
                    <input type="number" id="price_egp" placeholder="السعر بالجنيه *">
                    <input type="number" id="price_usd" placeholder="السعر بالدولار">
                    <input type="text" id="link" placeholder="رابط الشراء *">
                    <input type="number" id="qty" placeholder="الكمية المتاحة">
                    <textarea id="desc" rows="2" placeholder="وصف المنتج"></textarea>
                </div>
                <button class="btn-primary" onclick="addProduct()">✨ أضف المنتج</button>
            </div>
            <h3>📋 المنتجات</h3>
            <div id="productsTable" style="overflow-x:auto;"></div>
        </div>

        <!-- صفحة الشراء -->
        <div id="storePage" style="display:none;">
            <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
                <h2>🛍️ المنتجات</h2>
                <select id="currency" onchange="showStore()">
                    <option value="egp">🇪🇬 جنيه</option>
                    <option value="usd">🇺🇸 دولار</option>
                </select>
            </div>
            <div id="storeGrid"></div>
        </div>

        <!-- صفحة الإعدادات -->
        <div id="settingsPage" style="display:none;">
            <div style="max-width:500px; margin:auto; background:#f1f5f9; padding:30px; border-radius:30px;">
                <h3>🔐 تغيير كلمة السر</h3>
                <input type="password" id="newPass" placeholder="كلمة السر الجديدة" style="margin-bottom:15px;">
                <input type="password" id="confirmPass" placeholder="تأكيد كلمة السر" style="margin-bottom:20px;">
                <button class="btn-primary" onclick="changePass()">تحديث</button>
                <div id="passMsg" style="margin-top:15px;"></div>
            </div>
        </div>
    </div>
    <div class="footer">✅ منتجاتك محفوظة على Supabase</div>
</div>

<script>
    const SUPABASE_URL = 'https://haznqxasxmwcxlpzxzan.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_bcN3M6Ih0Y3Fhf3bk873GQ_Sd4p4BOy';
    const supabase = supabaseJs.createClient(SUPABASE_URL, SUPABASE_KEY);

    let products = [];

    // التحقق من تسجيل الدخول
    if (localStorage.getItem('admin_logged') !== 'yes') {
        window.location.href = 'index.html';
    }

    // تحميل المنتجات
    async function loadProducts() {
        document.getElementById('loading').style.display = 'block';
        const { data, error } = await supabase.from('products').select('*').order('created_at', { ascending: false });
        if (error) {
            console.error(error);
            alert('خطأ في تحميل المنتجات: ' + error.message);
        } else {
            products = data || [];
            showDashboard();
            showStore();
        }
        document.getElementById('loading').style.display = 'none';
    }

    // عرض جدول الإدارة
    function showDashboard() {
        if (products.length === 0) {
            document.getElementById('productsTable').innerHTML = '<p style="text-align:center;">✨ لا توجد منتجات</p>';
            return;
        }
        let html = `<table><thead><tr><th>المنتج</th><th>EGP</th><th>USD</th><th>الكمية</th><th>الرابط</th><th>مسح</th></tr></thead><tbody>`;
        for (let p of products) {
            html += `<tr>
                        <td><strong>${escapeHtml(p.name)}</strong><br><small>${escapeHtml((p.description || '').substring(0,40))}</small></td>
                        <td>${p.price_egp} ج.م</td>
                        <td>${p.price_usd} $</td>
                        <td>${p.quantity}</td>
                        <td><a href="${p.purchase_link}" target="_blank">🔗 رابط</a></td>
                        <td><button class="btn-primary btn-danger" style="padding:5px 15px;" onclick="deleteProduct('${p.id}')">🗑️</button></td>
                    </tr>`;
        }
        html += `</tbody></table>`;
        document.getElementById('productsTable').innerHTML = html;
    }

    // عرض صفحة الشراء
    function showStore() {
        const currency = document.getElementById('currency').value;
        if (products.length === 0) {
            document.getElementById('storeGrid').innerHTML = '<p style="text-align:center;">📭 لا توجد منتجات</p>';
            return;
        }
        let html = '<div class="products-grid">';
        for (let i = 0; i < products.length; i++) {
            let p = products[i];
            let price = currency === 'egp' ? p.price_egp + ' ج.م' : p.price_usd + ' $';
            html += `<div class="product-card">
                        <h3>🌟 ${escapeHtml(p.name)}</h3>
                        <p>${escapeHtml(p.description || 'منتج مميز')}</p>
                        <div class="price">${price}</div>
                        <div>📦 متاح: ${p.quantity}</div>
                        <div style="margin: 15px 0;">
                            <label>الكمية: </label>
                            <input type="number" id="qty_${p.id}" min="1" max="${p.quantity}" value="1" style="width:80px;">
                        </div>
                        <button class="btn-primary btn-success" style="width:100%;" onclick="buyProduct('${p.id}', ${p.quantity})">🛒 شراء</button>
                    </div>`;
        }
        html += '</div>';
        document.getElementById('storeGrid').innerHTML = html;
    }

    // إضافة منتج
    async function addProduct() {
        let name = document.getElementById('name').value;
        let price_egp = parseFloat(document.getElementById('price_egp').value);
        let price_usd = parseFloat(document.getElementById('price_usd').value) || 0;
        let link = document.getElementById('link').value;
        let qty = parseInt(document.getElementById('qty').value) || 0;
        let desc = document.getElementById('desc').value;

        if (!name || isNaN(price_egp) || !link) {
            alert('✏️ املأ الاسم والسعر والرابط');
            return;
        }

        document.getElementById('loading').style.display = 'block';
        const { error } = await supabase.from('products').insert([{
            name, price_egp, price_usd, purchase_link: link, quantity: qty, description: desc
        }]);
        if (error) {
            alert('خطأ: ' + error.message);
        } else {
            document.getElementById('name').value = '';
            document.getElementById('price_egp').value = '';
            document.getElementById('price_usd').value = '';
            document.getElementById('link').value = '';
            document.getElementById('qty').value = '';
            document.getElementById('desc').value = '';
            await loadProducts();
            alert('✅ تم إضافة المنتج');
        }
        document.getElementById('loading').style.display = 'none';
    }

    // حذف منتج
    async function deleteProduct(id) {
        if (!confirm('هل أنت متأكد؟')) return;
        document.getElementById('loading').style.display = 'block';
        await supabase.from('products').delete().eq('id', id);
        await loadProducts();
        document.getElementById('loading').style.display = 'none';
    }

    // شراء منتج
    async function buyProduct(id, availableQty) {
        let qtyInput = document.getElementById(`qty_${id}`);
        let qty = qtyInput ? parseInt(qtyInput.value) : 1;
        if (isNaN(qty) || qty <= 0 || qty > availableQty) {
            alert('الكمية غير صحيحة');
            return;
        }
        let product = products.find(p => p.id == id);
        if (!product || !product.purchase_link) {
            alert('لا يوجد رابط شراء');
            return;
        }
        window.open(product.purchase_link, '_blank');
        
        document.getElementById('loading').style.display = 'block';
        let newQty = product.quantity - qty;
        await supabase.from('products').update({ quantity: newQty }).eq('id', id);
        await loadProducts();
        document.getElementById('loading').style.display = 'none';
        alert(`✅ تم شراء ${qty} من ${product.name}`);
    }

    // تبديل الصفحات
    function showPage(page) {
        document.getElementById('dashboardPage').style.display = page === 'dashboard' ? 'block' : 'none';
        document.getElementById('storePage').style.display = page === 'store' ? 'block' : 'none';
        document.getElementById('settingsPage').style.display = page === 'settings' ? 'block' : 'none';
        document.getElementById('btnDash').classList.toggle('active', page === 'dashboard');
        document.getElementById('btnStore').classList.toggle('active', page === 'store');
        document.getElementById('btnSettings').classList.toggle('active', page === 'settings');
        if (page === 'store') showStore();
    }

    // تغيير كلمة السر
    function changePass() {
        let newPass = document.getElementById('newPass').value;
        let confirmPass = document.getElementById('confirmPass').value;
        if (!newPass) {
            document.getElementById('passMsg').innerHTML = '✏️ اكتب كلمة سر جديدة';
            return;
        }
        if (newPass !== confirmPass) {
            document.getElementById('passMsg').innerHTML = '❌ كلمتا السر غير متطابقتين';
            return;
        }
        localStorage.setItem('admin_pass', newPass);
        document.getElementById('passMsg').innerHTML = '✅ تم التغيير بنجاح';
        document.getElementById('newPass').value = '';
        document.getElementById('confirmPass').value = '';
        setTimeout(() => document.getElementById('passMsg').innerHTML = '', 2000);
    }

    // تسجيل خروج
    function logout() {
        localStorage.removeItem('admin_logged');
        window.location.href = 'index.html';
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    loadProducts();
</script>
</body>
</html>
